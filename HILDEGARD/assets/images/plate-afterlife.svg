<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="A tree rooted in a book, its branches reaching towards constellations — visual metaphor for Viriditas re-flowering across eight centuries of silence.">
  <defs>
    <linearGradient id="af-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#18382B"/>
      <stop offset="1" stop-color="#113124"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#af-green)"/>
  <g stroke="#A7B77A" stroke-width="1.3" fill="none">
    <!-- Open book at the base -->
    <path d="M280 420 L280 380 L400 400 L520 380 L520 420 Z" fill="#F0E6CF" stroke="#B48A3C"/>
    <line x1="400" y1="400" x2="400" y2="420"/>
    <line x1="310" y1="410" x2="390" y2="405"/>
    <line x1="410" y1="405" x2="490" y2="410"/>

    <!-- Trunk rising from book -->
    <path d="M400 400 Q400 320 400 260 Q400 200 400 140"/>
    <line x1="395" y1="400" x2="395" y2="140"/>
    <line x1="405" y1="400" x2="405" y2="140"/>

    <!-- Branches -->
    <path d="M400 300 Q340 260 300 220"/>
    <path d="M400 300 Q460 260 500 220"/>
    <path d="M400 240 Q340 210 290 180"/>
    <path d="M400 240 Q460 210 510 180"/>
    <path d="M400 180 Q370 140 340 110"/>
    <path d="M400 180 Q430 140 460 110"/>
    <path d="M400 140 Q400 90 400 60"/>

    <!-- Leaves -->
    <g fill="#A7B77A" stroke="none" opacity="0.9">
      <circle cx="300" cy="220" r="9"/>
      <circle cx="500" cy="220" r="9"/>
      <circle cx="290" cy="180" r="9"/>
      <circle cx="510" cy="180" r="9"/>
      <circle cx="340" cy="110" r="9"/>
      <circle cx="460" cy="110" r="9"/>
      <circle cx="400" cy="60" r="10"/>
    </g>

    <!-- Constellation stars above tree -->
    <g fill="#D9B366" stroke="none">
      <circle cx="120" cy="60" r="2"/>
      <circle cx="200" cy="100" r="2.5"/>
      <circle cx="150" cy="150" r="2"/>
      <circle cx="680" cy="70" r="2.5"/>
      <circle cx="620" cy="120" r="2"/>
      <circle cx="720" cy="160" r="2"/>
    </g>

    <!-- Dates: silence -->
    <text x="120" y="470" font-family="'Fira Code',monospace" font-size="11" letter-spacing="0.16em" fill="#B9B29A">1179 · SILENCE →</text>
    <text x="680" y="470" text-anchor="end" font-family="'Fira Code',monospace" font-size="11" letter-spacing="0.16em" fill="#D9B366">2012 · DOCTOR OF THE CHURCH</text>
  </g>
</svg>
