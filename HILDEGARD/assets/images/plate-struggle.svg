<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="A cathedral bell above a struck-through musical staff — visual metaphor for the ban on singing at Rupertsberg, 1178–1179.">
  <defs>
    <linearGradient id="st-parch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0E6CF"/>
      <stop offset="1" stop-color="#D7C5A4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#st-parch)"/>
  <g stroke="#18382B" stroke-width="1.4" fill="none">
    <!-- Bell tower silhouette -->
    <rect x="340" y="80" width="120" height="220"/>
    <path d="M340 80 L400 30 L460 80 Z"/>
    <path d="M370 150 Q400 110 430 150 L430 220 L370 220 Z"/>
    <line x1="400" y1="110" x2="400" y2="220"/>
    <circle cx="400" cy="215" r="4" fill="#18382B"/>
    <!-- Cross on top -->
    <line x1="400" y1="10" x2="400" y2="30"/>
    <line x1="390" y1="18" x2="410" y2="18"/>

    <!-- Musical staff underneath -->
    <line x1="120" y1="340" x2="680" y2="340"/>
    <line x1="120" y1="360" x2="680" y2="360"/>
    <line x1="120" y1="380" x2="680" y2="380"/>
    <line x1="120" y1="400" x2="680" y2="400"/>

    <!-- Notes (partly finished, then interrupted) -->
    <g fill="#18382B" stroke="none">
      <rect x="140" y="345" width="8" height="30"/>
      <rect x="180" y="340" width="8" height="30"/>
      <rect x="220" y="355" width="8" height="30"/>
      <rect x="260" y="340" width="8" height="30"/>
      <rect x="300" y="345" width="8" height="30"/>
    </g>
    <!-- Red bar through -->
    <line x1="120" y1="370" x2="680" y2="370" stroke="#7A2A2A" stroke-width="6" opacity="0.9"/>

    <!-- Second staff line labels -->
    <text x="120" y="440" font-family="'Fira Code',monospace" font-size="12" letter-spacing="0.16em" fill="#7A2A2A">INTERDICT · 1178-1179 · NO CHANT</text>
    <text x="680" y="440" text-anchor="end" font-family="'Cormorant Garamond',serif" font-style="italic" font-size="16" fill="#18382B">"禁止歌颂上帝，就是魔鬼的胜利。"</text>
  </g>
</svg>
