<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="A chant staff arcing across the sky, with women singing beneath — visual metaphor for the leap from ground-walking chant to soul-flying melody.">
  <defs>
    <radialGradient id="sy-glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#7CA0D9" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#0B1524" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="#0B1524"/>
  <rect width="800" height="500" fill="url(#sy-glow)"/>

  <g stroke="#D9B366" stroke-width="1.2" fill="none">
    <!-- Two horizontal comparison lines: Gregorian (bottom, straight) vs Hildegard (top, arcing) -->
    <line x1="80" y1="380" x2="720" y2="380"/>
    <line x1="80" y1="400" x2="720" y2="400"/>
    <line x1="80" y1="420" x2="720" y2="420"/>
    <text x="80" y="450" font-family="'Fira Code',monospace" font-size="11" letter-spacing="0.16em" fill="#B9B29A">GREGORIAN · walking prayer</text>

    <path d="M80 240 Q400 60 720 240" stroke-width="1.5"/>
    <path d="M80 260 Q400 80 720 260" stroke-width="1.5"/>
    <path d="M80 220 Q400 40 720 220" stroke-width="1.5"/>
    <text x="80" y="200" font-family="'Fira Code',monospace" font-size="11" letter-spacing="0.16em" fill="#D9B366">HILDEGARD · flight of the soul</text>

    <!-- Gregorian neumes: small ticks on the straight staff -->
    <g fill="#B9B29A" stroke="none">
      <rect x="120" y="393" width="8" height="14"/>
      <rect x="180" y="393" width="8" height="14"/>
      <rect x="240" y="393" width="8" height="14"/>
      <rect x="300" y="393" width="8" height="14"/>
      <rect x="360" y="393" width="8" height="14"/>
      <rect x="420" y="393" width="8" height="14"/>
      <rect x="480" y="393" width="8" height="14"/>
      <rect x="540" y="393" width="8" height="14"/>
      <rect x="600" y="393" width="8" height="14"/>
      <rect x="660" y="393" width="8" height="14"/>
    </g>

    <!-- Hildegard neumes: dots at high peaks on arcing staff -->
    <g fill="#D9B366" stroke="none">
      <circle cx="140" cy="210" r="5"/>
      <circle cx="200" cy="150" r="5"/>
      <circle cx="260" cy="100" r="6"/>
      <circle cx="320" cy="80" r="6"/>
      <circle cx="400" cy="60" r="7"/>
      <circle cx="480" cy="80" r="6"/>
      <circle cx="540" cy="100" r="6"/>
      <circle cx="600" cy="150" r="5"/>
      <circle cx="660" cy="210" r="5"/>
    </g>

    <!-- Two silhouettes of singing figures (geometric only, no face) -->
    <g fill="#547A52" stroke="#D9B366" stroke-width="1">
      <path d="M300 460 Q315 410 330 460 Z"/>
      <circle cx="315" cy="405" r="8"/>
      <path d="M470 460 Q485 410 500 460 Z"/>
      <circle cx="485" cy="405" r="8"/>
    </g>
  </g>
</svg>
