name: Cleanup obsolete branches

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cleanup-obsolete-branches.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete confirmed obsolete branches
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          branches=(
            "agent/add-hypatia-site"
            "agent/add-melromarc-sisters-site"
            "agent/document-and-validate-sites"
            "enheduanna-first-author"
            "gh-pages"
          )

          for branch in "${branches[@]}"; do
            ref="heads/${branch}"
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/${ref}" >/dev/null 2>&1; then
              echo "Deleting ${branch}"
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/${ref}"
            else
              echo "Already absent: ${branch}"
            fi
          done

          remaining="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/" --jq '.[].ref' | grep -v '^refs/heads/main$' || true)"
          if [[ -n "${remaining}" ]]; then
            echo "Unexpected branches remain:"
            echo "${remaining}"
            exit 1
          fi

          echo "Only main remains."
