name: Publish static mirror

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build GitHub Pages artifact
        run: npm run build:pages
      - name: Validate Hypatia mirror
        run: |
          test -f docs/HYPATIA/index.html
          test -f docs/HYPATIA/assets/hypatia-v2.css
          grep -q "希帕蒂娅：" docs/HYPATIA/index.html
          grep -q "教师之死" docs/HYPATIA/index.html
          grep -q "lake-v9" docs/HYPATIA/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
